{% extends "home_template.html" %}

    {% block head %}
    <script src="/static/js/admin_js.js"></script>
    {% endblock %}

    {% block title %}
    <!-- Top menu on small screens -->
    <header class="w3-container w3-top w3-hide-large w3-red w3-xlarge w3-padding">
      <a href="javascript:void(0)" class="w3-button w3-red w3-margin-right" onclick="w3_open()">☰</a>
      <span>Predicción AMR por scores</span>
    </header>
    {% endblock %}

    {% block content %}
    <!-- !PAGE CONTENT! -->
    <div class="w3-main" style="margin-left:340px;margin-right:40px">

      <!-- Header -->
      <div class="w3-container" style="margin-top:10px" id="showcase">
        <h1 class="w3-jumbo"><b>Aplicaciones web</b></h1>
        <h4 class="w3-text-red"><b>Predicción AMR por scores</b></h4>
        <hr style="width:50px;border:5px solid red" class="w3-round">
      </div>
    </div>
      <form style="border: 2px solid #333; padding: 20px; font-family: Arial, sans-serif; max-width: 800px; margin: auto;">
        <table style="width: 100%; border-collapse: collapse;">
          <!-- Fila para el grupo de radio (Summary files / Raw data) en las 2 primeras columnas -->
          <tr>
            <td colspan="2" style="padding: 10px; border-bottom: 1px solid #ccc;">
              <input type="radio" name="fileType" id="summary" value="summary" style="margin-right: 5px;">
              <label for="summary" style="margin-right: 15px;">Summary files</label>
              <input type="radio" name="fileType" id="raw" value="raw" style="margin-right: 5px;">
              <label for="raw">Raw data</label>
            </td>
            <!-- Encabezado de la tercera columna -->
            <td style="vertical-align: top; padding: 10px; border-bottom: 1px solid #ccc;">
              <div style="font-weight: bold;">Parameters</div>
            </td>
          </tr>
          <!-- Fila superior con las 3 columnas -->
          <tr>
            <!-- Primera columna: selección de archivos con radio buttons -->
            <td style="vertical-align: top; padding: 10px; border-right: 1px solid #ccc;">
              <div style="margin-bottom: 10px;">
                <input type="radio" name="fileOption" id="totalpileup" value="totalpileup" style="margin-right: 5px;">
                <label for="totalpileup" style="margin-right: 10px;">Totalpileup file</label>
                <input type="file" name="totalpileupFile" style=""/>
              </div>
              <div>
                <input type="radio" name="fileOption" id="snippy" value="snippy" style="margin-right: 5px;">
                <label for="snippy" style="margin-right: 10px;">Snippy snps.csv file</label>
                <input type="file" name="snippyFile" style=""/>
              </div>
            </td>
            <!-- Segunda columna: selección de carpeta -->
            <td style="vertical-align: top; padding: 10px; border-right: 1px solid #ccc;">
              <div style="margin-bottom: 10px;">
                <label for="fastqFolder" style="display: block; margin-bottom: 5px;">FASTQ data folder</label>
                <!-- Para escoger una carpeta se usa webkitdirectory (compatible con la mayoría de navegadores modernos) -->
                <input type="file" name="fastqFolder" id="fastqFolder" webkitdirectory directory style="width: 100%;"/>
              </div>
            </td>
            <!-- Tercera columna: parámetros -->
            <td style="vertical-align: top; padding: 10px;">
              <div style="margin-bottom: 10px;">
                <label for="samplesNumber" style="display: block; margin-bottom: 5px;">Samples number</label>
                <input type="number" name="samplesNumber" id="samplesNumber" value="1" style="width: 100%;"/>
              </div>
              <div style="margin-bottom: 10px;">
                <label for="selectValues" style="display: block; margin-bottom: 5px;">Select values</label>
                <select name="selectValues" id="selectValues" multiple style="width: 100%;">
                  <option value="option1">Option1</option>
                  <option value="option2">Option2</option>
                  <option value="option3">Option3</option>
                </select>
              </div>
              <div>
                <label for="comments" style="display: block; margin-bottom: 5px;">Comments</label>
                <input type="text" name="comments" id="comments" style="width: 100%;"/>
              </div>
            </td>
          </tr>
          <!-- Fila inferior para mostrar resultados -->
          <tr>
            <td colspan="3" style="padding: 10px; text-align: center;">
              <input type="submit" value="Calculate" style="padding: 10px 20px; margin-bottom: 10px;"/>
              <br>
              <textarea name="results" id="results" rows="6" style="width: 90%; padding: 10px;" readonly></textarea>
              <br>
              <button type="button" style="padding: 10px 20px; margin-top: 10px;">Download results</button>
            </td>
          </tr>
        </table>
      </form>

    {% endblock %}
