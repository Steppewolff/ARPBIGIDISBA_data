<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Resistome heatmap — all records</title>
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    .legend span { display:inline-block; padding:2px 10px; border-radius:3px; margin-right:8px; font-size:0.85em; }
    @media print { button { display:none; } }
  </style>
</head>
<body>
  <h2>Resistome heatmap — all filtered records</h2>
  <div class="legend">
    <span style="background:#ffb3b3">Mutation</span>
    <span style="background:#b3d4ff">Polymorphism</span>
    <span style="background:#d4b3ff">Both</span>
    <span style="background:#f0f0f0">WT</span>
  </div>
  <button onclick="window.print()" style="margin:10px 0; padding:6px 16px;">🖨 Print / Save as PDF</button>
  <div id="heatmap_all"></div>
  <script>
    var data = {{ heatmap_json|safe }};
    var colorscale = [
      [0,'#f0f0f0'],[0.333,'#f0f0f0'],
      [0.334,'#ffb3b3'],[0.666,'#ffb3b3'],
      [0.667,'#b3d4ff'],[0.999,'#b3d4ff'],
      [1.0,'#d4b3ff']
    ];
    Plotly.newPlot('heatmap_all', [{
      type: 'heatmap',
      x: data.genes, y: data.isolates, z: data.z, text: data.text,
      hovertemplate: '<b>%{y}</b> — %{x}<br>%{text}<extra></extra>',
      colorscale: colorscale, zmin: 0, zmax: 3, showscale: false,
      xgap: 1, ygap: 1,
    }], {
      margin: {l:130, r:20, t:20, b:90},
      height: Math.max(400, data.isolates.length * 22 + 100),
      xaxis: {tickangle: -45},
    }, {responsive: true});
  </script>
</body>
</html>
