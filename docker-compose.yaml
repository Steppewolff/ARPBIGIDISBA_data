version: '3.8'
services:
  db:
    image: mysql
    container_name: arpbig_psdb
    restart: always
    volumes:
      - ./psdb_dump.sql:/docker-entrypoint-initdb.d/dump.sql
      - ./mysql_data:/var/lib/mysql
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysql", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}", "-e", "SELECT 1"]
      timeout: 40s
      retries: 2

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ARPBIG_frontend
#    command: sh -c "python3 ./ARPBIGIDISBA_frontend/manage.py migrate --noinput && python3 ./ARPBIGIDISBA_frontend/manage.py collectstatic --noinput && python ./ARPBIGIDISBA_frontend/manage.py runserver 0.0.0.0:8000"
#    command: sh -c "python3 ./ARPBIGIDISBA_frontend/manage.py runserver 0.0.0.0:8000"
    restart: always
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: ${DB_HOST}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_PORT: ${DB_PORT}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
    depends_on:
      - db